
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#080c14;--bg1:#0d1220;--bg2:#111827;--bg3:#1a2236;
  --cyan:#00e5ff;--cyan2:#00b8cc;--cyan3:#004d5e;--cyan4:#001f26;
  --green:#00ff9d;--green2:#00cc7a;--green3:#004d30;
  --red:#ff4560;--red2:#cc2840;--red3:#4d0015;
  --purple:#a78bfa;--purple2:#6d52d4;
  --txt:#e2eaf7;--txt2:#7a8fad;--txt3:#3d4f6a;
  --border:#1e2d45;--border2:#2a3f5f;
}
body{background:var(--bg0);color:var(--txt);font-family:var(--font-sans,'Inter',sans-serif)}
.app{max-width:420px;margin:0 auto;min-height:100vh;background:var(--bg0)}

.hdr{background:var(--bg1);border-bottom:1px solid var(--border);padding:14px 16px 0;position:sticky;top:0;z-index:10}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.hdr-icon{width:32px;height:32px;background:var(--cyan4);border:1px solid var(--cyan3);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:16px}
.hdr-title{font-size:15px;font-weight:500;color:var(--txt);letter-spacing:0.3px}
.hdr-sub{font-size:11px;color:var(--cyan);letter-spacing:1px}
.status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;margin-left:auto;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.nav{display:flex;gap:0}
.nb{flex:1;padding:10px 0;font-size:12px;font-weight:400;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt2);cursor:pointer;letter-spacing:0.3px;transition:all .15s}
.nb.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.nb i{display:block;font-size:18px;margin-bottom:3px}

.content{padding:14px}
.screen{display:none}
.screen.active{display:block}

.balance-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.balance-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cyan)}
.balance-card.neg::before{background:var(--red)}
.bal-lbl{font-size:11px;color:var(--txt2);letter-spacing:1px;margin-bottom:6px}
.bal-val{font-size:32px;font-weight:500;letter-spacing:-0.5px}
.bal-val.pos{color:var(--green)}
.bal-val.neg{color:var(--red)}
.bal-meta{font-size:12px;color:var(--txt2);margin-top:6px}

.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px}
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px}
.mcard-lbl{font-size:11px;color:var(--txt2);margin-bottom:6px;letter-spacing:0.5px}
.mcard-val{font-size:20px;font-weight:500}
.mcard-val.g{color:var(--green)}
.mcard-val.r{color:var(--red)}
.mcard-val.b{color:var(--cyan)}
.mcard-val.p{color:var(--purple)}
.mcard-icon{font-size:14px;margin-right:4px}

.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
.panel-title{font-size:12px;font-weight:500;color:var(--txt2);letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.panel-title i{color:var(--cyan);font-size:16px}
.panel-title span{color:var(--cyan)}

.bar-row{margin-bottom:10px}
.bar-head{display:flex;justify-content:space-between;font-size:11px;color:var(--txt2);margin-bottom:4px}
.bar-head .bv{color:var(--green);font-weight:500}
.bar-track{background:var(--bg3);border-radius:3px;height:5px;overflow:hidden}
.bar-fill{height:5px;border-radius:3px;transition:width .5s}
.bf-g{background:var(--green)}
.bf-r{background:var(--red)}

.sect-lbl{font-size:11px;color:var(--txt3);letter-spacing:1px;margin:14px 0 8px}

input[type=number],input[type=date],input[type=month],select{
  width:100%;height:40px;border-radius:8px;
  border:1px solid var(--border2);
  background:var(--bg3);color:var(--txt);
  font-size:13px;padding:0 12px;outline:none;
}
input:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,229,255,.1)}
select option{background:var(--bg2)}
.form-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.flbl{font-size:11px;color:var(--txt2);letter-spacing:0.5px;margin-bottom:5px;display:block}
.fgrp{margin-bottom:12px}

.btn{width:100%;padding:12px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:0.5px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.btn:active{transform:scale(.98)}
.btn-g{background:var(--green3);color:var(--green);border:1px solid var(--green2)}
.btn-g:hover{background:#005a38}
.btn-r{background:var(--red3);color:var(--red);border:1px solid var(--red2)}
.btn-r:hover{background:#6e001e}

.entry{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.entry-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--green)}
.dot-r{background:var(--red)}
.entry-info{flex:1;min-width:0}
.entry-date{font-size:11px;color:var(--txt2)}
.entry-desc{font-size:13px;color:var(--txt);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-val{font-size:15px;font-weight:500;white-space:nowrap}
.ev-g{color:var(--green)}
.ev-r{color:var(--red)}
.delbtn{background:none;border:none;color:var(--txt3);cursor:pointer;padding:4px;font-size:16px}
.delbtn:hover{color:var(--red)}

.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-top:3px;letter-spacing:0.5px}
.pill-g{background:var(--green3);color:var(--green)}
.pill-r{background:var(--red3);color:var(--red)}

.divider{height:1px;background:var(--border);margin:12px 0}
.empty{text-align:center;padding:36px 16px;color:var(--txt2);font-size:13px}
.empty i{font-size:36px;display:block;margin-bottom:10px;color:var(--txt3)}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;letter-spacing:0.3px;transition:opacity .3s;border:1px solid}
</style>

<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-icon"><i class="ti ti-motorbike" aria-hidden="true"></i></div>
      <div>
        <div class="hdr-title">Delivery Tracker</div>
        <div class="hdr-sub">Controle financeiro</div>
      </div>
      <div class="status-dot" title="online"></div>
    </div>
    <div class="nav">
      <button class="nb active" onclick="show('inicio')" id="tab-inicio"><i class="ti ti-layout-dashboard" aria-hidden="true"></i>Início</button>
      <button class="nb" onclick="show('registrar')" id="tab-registrar"><i class="ti ti-plus" aria-hidden="true"></i>Registrar</button>
      <button class="nb" onclick="show('historico')" id="tab-historico"><i class="ti ti-list" aria-hidden="true"></i>Histórico</button>
      <button class="nb" onclick="show('relatorio')" id="tab-relatorio"><i class="ti ti-chart-bar" aria-hidden="true"></i>Relatório</button>
    </div>
  </div>

  <div class="content">

    <div class="screen active" id="screen-inicio">
      <div id="bal-box"></div>
      <div class="grid2" id="metrics-grid"></div>
      <div class="panel">
        <div class="panel-title"><i class="ti ti-timeline" aria-hidden="true"></i><span>Semana atual</span></div>
        <div id="week-bars"></div>
      </div>
      <div class="panel">
        <div class="panel-title"><i class="ti ti-calendar-stats" aria-hidden="true"></i><span>Resumo do mês</span></div>
        <div class="grid2" id="month-grid" style="margin-bottom:0"></div>
      </div>
    </div>

    <div class="screen" id="screen-registrar">
      <div class="panel">
        <div class="panel-title"><i class="ti ti-cash" aria-hidden="true"></i><span style="color:var(--green)">Ganho da noite</span></div>
        <div class="fgrp"><label class="flbl">Data</label><input type="date" id="g-data"></div>
        <div class="form-row">
          <div class="fgrp"><label class="flbl">Valor (R$)</label><input type="number" id="g-val" placeholder="0,00" min="0" step="0.01"></div>
          <div class="fgrp"><label class="flbl">Entregas</label><input type="number" id="g-ent" placeholder="0" min="0"></div>
        </div>
        <button class="btn btn-g" onclick="addGanho()"><i class="ti ti-plus" aria-hidden="true"></i>Registrar ganho</button>
      </div>
      <div class="panel">
        <div class="panel-title"><i class="ti ti-gas-station" aria-hidden="true"></i><span style="color:var(--red)">Gasto da moto</span></div>
        <div class="fgrp"><label class="flbl">Data</label><input type="date" id="c-data"></div>
        <div class="form-row">
          <div class="fgrp"><label class="flbl">Tipo</label>
            <select id="c-tipo">
              <option>Gasolina</option><option>Manutenção</option><option>Óleo</option><option>Pneu</option><option>Outro</option>
            </select>
          </div>
          <div class="fgrp"><label class="flbl">Valor (R$)</label><input type="number" id="c-val" placeholder="0,00" min="0" step="0.01"></div>
        </div>
        <button class="btn btn-r" onclick="addGasto()"><i class="ti ti-plus" aria-hidden="true"></i>Registrar gasto</button>
      </div>
    </div>

    <div class="screen" id="screen-historico">
      <div class="fgrp" style="margin-bottom:12px">
        <select id="hist-filtro" onchange="renderHist()">
          <option value="todos">Todos os registros</option>
          <option value="ganhos">Somente ganhos</option>
          <option value="gastos">Somente gastos</option>
        </select>
      </div>
      <div id="hist-list"></div>
    </div>

    <div class="screen" id="screen-relatorio">
      <div class="fgrp" style="margin-bottom:14px">
        <label class="flbl">Selecionar mês</label>
        <input type="month" id="rel-mes" style="height:40px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--txt);font-size:13px;padding:0 12px;width:100%;outline:none">
      </div>
      <div id="rel-content"></div>
    </div>

  </div>
</div>

<script>
let D=JSON.parse(localStorage.getItem('dlv2')||'{"g":[],"c":[]}');
const save=()=>localStorage.setItem('dlv2',JSON.stringify(D));
const hj=()=>new Date().toISOString().split('T')[0];
const mes=()=>hj().slice(0,7);
const fmt=v=>'R$ '+Number(v).toFixed(2).replace('.',',');
const fdt=s=>{const[a,m,d]=s.split('-');return`${d}/${m}`};

document.getElementById('g-data').value=hj();
document.getElementById('c-data').value=hj();

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='inicio')renderInicio();
  if(id==='historico')renderHist();
  if(id==='relatorio')renderRel();
}

function toast(txt,cor){
  const t=document.createElement('div');
  t.className='toast';
  t.textContent=txt;
  t.style.background=cor==='g'?'var(--green3)':'var(--red3)';
  t.style.color=cor==='g'?'var(--green)':'var(--red)';
  t.style.borderColor=cor==='g'?'var(--green2)':'var(--red2)';
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},1800);
}

function addGanho(){
  const data=document.getElementById('g-data').value;
  const val=parseFloat(document.getElementById('g-val').value);
  const ent=parseInt(document.getElementById('g-ent').value)||0;
  if(!data||isNaN(val)||val<=0){toast('Informe data e valor','r');return;}
  D.g.push({id:Date.now(),data,val,ent});save();
  document.getElementById('g-val').value='';
  document.getElementById('g-ent').value='';
  toast('Ganho registrado!','g');renderInicio();
}

function addGasto(){
  const data=document.getElementById('c-data').value;
  const tipo=document.getElementById('c-tipo').value;
  const val=parseFloat(document.getElementById('c-val').value);
  if(!data||isNaN(val)||val<=0){toast('Informe data e valor','r');return;}
  D.c.push({id:Date.now(),data,tipo,val});save();
  document.getElementById('c-val').value='';
  toast('Gasto registrado!','r');renderInicio();
}

function semana(){
  const d=new Date(),dia=d.getDay();
  const seg=new Date(d);seg.setDate(d.getDate()-(dia===0?6:dia-1));
  const dom=new Date(seg);dom.setDate(seg.getDate()+6);
  return[seg.toISOString().split('T')[0],dom.toISOString().split('T')[0]];
}

function renderInicio(){
  const[seg,dom]=semana();const m=mes();
  const gSem=D.g.filter(x=>x.data>=seg&&x.data<=dom).reduce((a,x)=>a+x.val,0);
  const cSem=D.c.filter(x=>x.data>=seg&&x.data<=dom).reduce((a,x)=>a+x.val,0);
  const eSem=D.g.filter(x=>x.data>=seg&&x.data<=dom).reduce((a,x)=>a+x.ent,0);
  const gMes=D.g.filter(x=>x.data.startsWith(m)).reduce((a,x)=>a+x.val,0);
  const cMes=D.c.filter(x=>x.data.startsWith(m)).reduce((a,x)=>a+x.val,0);
  const lMes=gMes-cMes;
  const hj_=hj();
  const gH=D.g.filter(x=>x.data===hj_).reduce((a,x)=>a+x.val,0);
  const cH=D.c.filter(x=>x.data===hj_).reduce((a,x)=>a+x.val,0);
  const lSem=gSem-cSem;

  document.getElementById('bal-box').innerHTML=`
    <div class="balance-card ${lMes<0?'neg':''}">
      <div class="bal-lbl">SALDO LÍQUIDO DO MÊS</div>
      <div class="bal-val ${lMes>=0?'pos':'neg'}">${fmt(lMes)}</div>
      <div class="bal-meta"><i class="ti ti-trending-up" style="color:var(--green);font-size:12px" aria-hidden="true"></i> ${fmt(gMes)} ganho &nbsp;·&nbsp; <i class="ti ti-trending-down" style="color:var(--red);font-size:12px" aria-hidden="true"></i> ${fmt(cMes)} gasto</div>
    </div>`;

  document.getElementById('metrics-grid').innerHTML=`
    <div class="mcard"><div class="mcard-lbl">Ganho hoje</div><div class="mcard-val g">${fmt(gH)}</div></div>
    <div class="mcard"><div class="mcard-lbl">Gasto hoje</div><div class="mcard-val r">${fmt(cH)}</div></div>
    <div class="mcard"><div class="mcard-lbl">Ganho semana</div><div class="mcard-val g">${fmt(gSem)}</div></div>
    <div class="mcard"><div class="mcard-lbl">Entregas semana</div><div class="mcard-val b">${eSem}</div></div>`;

  const dias=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const maxVal=Math.max(...Array.from({length:7},(_,i)=>{
    const d=new Date(seg);d.setDate(d.getDate()+i);const ds=d.toISOString().split('T')[0];
    return D.g.filter(x=>x.data===ds).reduce((a,x)=>a+x.val,0);
  }),1);
  let bars='';
  for(let i=0;i<7;i++){
    const d=new Date(seg);d.setDate(d.getDate()+i);const ds=d.toISOString().split('T')[0];
    const gd=D.g.filter(x=>x.data===ds).reduce((a,x)=>a+x.val,0);
    const cd=D.c.filter(x=>x.data===ds).reduce((a,x)=>a+x.val,0);
    const pg=Math.round((gd/maxVal)*100);
    const pc=Math.round((cd/maxVal)*100);
    const isHj=ds===hj_?'style="color:var(--cyan)"':'';
    bars+=`<div class="bar-row">
      <div class="bar-head"><span ${isHj}>${dias[i]} ${fdt(ds)}</span>${gd>0?`<span class="bv">${fmt(gd)}</span>`:''}</div>
      <div class="bar-track"><div class="bar-fill bf-g" style="width:${pg}%"></div></div>
      ${cd>0?`<div class="bar-track" style="margin-top:3px"><div class="bar-fill bf-r" style="width:${pc}%"></div></div>`:''}
    </div>`;
  }
  document.getElementById('week-bars').innerHTML=bars||'<div class="empty"><i class="ti ti-moon" aria-hidden="true"></i>Nenhuma corrida esta semana</div>';

  const eMes=D.g.filter(x=>x.data.startsWith(m)).reduce((a,x)=>a+x.ent,0);
  const tm=eMes>0?(gMes/eMes).toFixed(2):0;
  document.getElementById('month-grid').innerHTML=`
    <div class="mcard"><div class="mcard-lbl">Total ganho</div><div class="mcard-val g">${fmt(gMes)}</div></div>
    <div class="mcard"><div class="mcard-lbl">Total gasto</div><div class="mcard-val r">${fmt(cMes)}</div></div>
    <div class="mcard"><div class="mcard-lbl">Lucro líquido</div><div class="mcard-val ${lMes>=0?'g':'r'}">${fmt(lMes)}</div></div>
    <div class="mcard"><div class="mcard-lbl">Ticket médio</div><div class="mcard-val p">${fmt(tm)}</div></div>`;
}

function renderHist(){
  const f=document.getElementById('hist-filtro').value;
  let todos=[];
  if(f!=='gastos')D.g.forEach(x=>todos.push({...x,tipo:'ganho'}));
  if(f!=='ganhos')D.c.forEach(x=>todos.push({...x,tipo:'gasto'}));
  todos.sort((a,b)=>b.data.localeCompare(a.data)||b.id-a.id);
  if(!todos.length){
    document.getElementById('hist-list').innerHTML='<div class="empty"><i class="ti ti-database-off" aria-hidden="true"></i>Nenhum registro ainda</div>';return;
  }
  document.getElementById('hist-list').innerHTML=todos.map(e=>`
    <div class="entry">
      <div class="entry-dot ${e.tipo==='ganho'?'dot-g':'dot-r'}"></div>
      <div class="entry-info">
        <div class="entry-date">${fdt(e.data)} ${e.data.slice(0,4)}</div>
        <div class="entry-desc">${e.tipo==='ganho'?'Ganho'+(e.ent?' · '+e.ent+' entregas':''):e.tipo}</div>
        <span class="pill ${e.tipo==='ganho'?'pill-g':'pill-r'}">${e.tipo==='ganho'?'GANHO':'GASTO'}</span>
      </div>
      <div class="entry-val ${e.tipo==='ganho'?'ev-g':'ev-r'}">${e.tipo==='ganho'?'+':'-'}${fmt(e.val)}</div>
      <button class="delbtn" onclick="del('${e.id}','${e.tipo}')" aria-label="Remover"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`).join('');
}

function del(id,tipo){
  if(!confirm('Remover este registro?'))return;
  if(tipo==='ganho')D.g=D.g.filter(x=>String(x.id)!==id);
  else D.c=D.c.filter(x=>String(x.id)!==id);
  save();renderHist();renderInicio();
}

function renderRel(){
  const ri=document.getElementById('rel-mes');
  if(!ri.value)ri.value=mes();
  ri.oninput=renderRel;
  const m=ri.value;
  const gs=D.g.filter(x=>x.data.startsWith(m));
  const cs=D.c.filter(x=>x.data.startsWith(m));
  const tg=gs.reduce((a,x)=>a+x.val,0);
  const tc=cs.reduce((a,x)=>a+x.val,0);
  const lucro=tg-tc;
  const ent=gs.reduce((a,x)=>a+x.ent,0);
  const tick=ent>0?(tg/ent).toFixed(2):0;
  const catMap={};
  cs.forEach(x=>{catMap[x.tipo]=(catMap[x.tipo]||0)+x.val});

  let cats='';
  Object.entries(catMap).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    const pct=tc>0?Math.round((v/tc)*100):0;
    cats+=`<div class="bar-row">
      <div class="bar-head"><span>${k}</span><span style="color:var(--red)">${fmt(v)} · ${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill bf-r" style="width:${pct}%"></div></div>
    </div>`;
  });

  document.getElementById('rel-content').innerHTML=`
    <div class="balance-card ${lucro<0?'neg':''}">
      <div class="bal-lbl">RESULTADO DO MÊS</div>
      <div class="bal-val ${lucro>=0?'pos':'neg'}">${fmt(lucro)}</div>
    </div>
    <div class="grid2">
      <div class="mcard"><div class="mcard-lbl">Total ganho</div><div class="mcard-val g">${fmt(tg)}</div></div>
      <div class="mcard"><div class="mcard-lbl">Total gasto</div><div class="mcard-val r">${fmt(tc)}</div></div>
      <div class="mcard"><div class="mcard-lbl">Entregas</div><div class="mcard-val b">${ent}</div></div>
      <div class="mcard"><div class="mcard-lbl">Ticket médio</div><div class="mcard-val p">${fmt(tick)}</div></div>
    </div>
    ${cats?`<div class="panel"><div class="panel-title"><i class="ti ti-chart-donut" aria-hidden="true"></i><span>Gastos por categoria</span></div>${cats}</div>`:''}
    ${!gs.length&&!cs.length?'<div class="empty"><i class="ti ti-moon" aria-hidden="true"></i>Nenhum dado para este mês</div>':''}`;
}

renderInicio();
</script>
